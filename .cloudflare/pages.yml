# Cloudflare Pages配置文件

# 构建命令
build_command: npm run build

# 构建输出目录
build_output_directory: dist

# 环境变量
env:
  NODE_VERSION: 18

# 部署分支
deploy_branches:
  - main

# 预览分支
preview_branches:
  - develop
  - feature/*

# 路由规则
routes:
  - pattern: /*
    destination: /index.html
  - pattern: /api/*
    destination: /api/index.ts
    function: true